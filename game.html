<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atrapa Corazones 💖</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page">
  <a href="index.html" class="back">← Volver</a>

  <div class="game-wrap">
    <h2>Atrapa los corazones, Patty 💖</h2>
    <p class="hint">Mueve la canasta con el mouse o el dedo. ¡Evita las equis!</p>

    <div class="game-hud">
      <span>Puntos: <b id="score">0</b></span>
      <span>Vidas: <b id="lives">3</b></span>
      <span>Tiempo: <b id="time">60</b></span>
    </div>

    <canvas id="game" width="600" height="500"></canvas>

    <div class="game-buttons">
      <button id="start-btn">Empezar</button>
    </div>

    <div id="game-over" class="game-over hidden">
      <h3 id="go-title">¡Bien hecho!</h3>
      <p id="go-msg"></p>
      <button id="restart-btn">Jugar de nuevo</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>initGame();</script>
</body>
</html>
